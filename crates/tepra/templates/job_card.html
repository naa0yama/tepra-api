<div id="job-{{ job_id }}"
{% if !job_end && !canceled %}
  hx-get="/ui/jobs/{{ printer_name }}/{{ job_id }}"
  hx-trigger="every 1s"
  hx-swap="outerHTML"
{% endif %}
  class="card bg-base-100 shadow p-4 m-2">
  <p class="font-bold">{{ printer_name }}</p>
  <p>ジョブ #{{ job_id }}</p>
{% if canceled %}
  <p class="text-error">キャンセル済み</p>
{% else if job_end %}
  <p class="text-success">完了</p>
{% else %}
  <p>進捗:
{% if let Some(p) = progress %}
    {{ p }}%
{% else %}
    待機中
{% endif %}
  </p>
{% endif %}
</div>
