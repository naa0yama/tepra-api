# I/O-only and TUI functions in graft are excluded via #[cfg_attr(coverage_nightly, coverage(off))].
# cargo-llvm-cov automatically sets --cfg coverage_nightly when using a nightly toolchain,
# which activates the #[coverage(off)] attribute on annotated functions.
# No --ignore-filename-regex needed: exclusion is per-function, not per-file.
[coverage]
description = "Generate LCOV coverage report and verify thresholds"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:19999" }
run = """
#!/usr/bin/env bash
set -euo pipefail

rustup component add llvm-tools-preview --toolchain nightly-2026-03-15
quiet=""; [[ "${CLAUDECODE:-}" == "1" ]] && quiet="--cargo-quiet --cargo-quiet --status-level fail"
_cpus=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
_threads=$(( _cpus * 7 / 10 < 1 ? 1 : _cpus * 7 / 10 ))
if [[ "${GITHUB_ACTIONS:-}" == "true" ]]; then _threads="$_cpus"; fi
cargo +nightly-2026-03-15 llvm-cov nextest --all-targets --all-features --fail-under-lines 90 --lcov --output-path target/lcov.info --test-threads "$_threads" $quiet
"""

["coverage:html"]
description = "Generate HTML coverage report and open"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:19999" }
run = """
#!/usr/bin/env bash
