["setup:playwright"]
description = "Install @playwright/mcp deps and download Chromium browser"
run = """
#!/usr/bin/env bash
set -euo pipefail

# Locate the package.json that declares @playwright/mcp (works before pnpm install)
_pnpm_dir=$(grep -rl '"@playwright/mcp"' --include='package.json' . \
  | grep -v node_modules | head -1 | xargs dirname)
if [ -z "$_pnpm_dir" ]; then
  echo "Error: no package.json with @playwright/mcp found" >&2
  exit 1
fi

pnpm --dir "$_pnpm_dir" install --frozen-lockfile

_playwright_cli=$(find "$_pnpm_dir/node_modules/.pnpm" -name "cli.js" -path "*/playwright/cli.js" | head -1)
if [ -z "$_playwright_cli" ]; then
  echo "Error: playwright cli.js not found in pnpm store" >&2
  exit 1
fi
node "$_playwright_cli" install chromium

. .devcontainer/o2-env.sh
python3 .devcontainer/gen_mcp_json.py
echo "Playwright MCP ready. Run /mcp in Claude Code to reload."
"""
