[o2]
description = "Start OpenObserve (OTLP HTTP via :5080, UI :5080)"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "" }
run = """
#!/usr/bin/env bash
set -euo pipefail

if ! command -v openobserve > /dev/null 2>&1; then
  echo 'Error: openobserve not found. Run "mise run o2:install" first.' >&2
  exit 1
fi
if pgrep -x openobserve > /dev/null 2>&1; then
  echo 'OpenObserve is already running.'
  exit 0
fi
rm -rf /tmp/openobserve-data
. .devcontainer/o2-env.sh
_root="$(pwd)"
setsid bash -c ". ${_root}/.devcontainer/o2-env.sh && openobserve" >/dev/null 2>&1 &
timeout 60 bash -c 'until curl -sf --max-time 1 http://localhost:5080/healthz > /dev/null 2>&1; do sleep 0.5; done'
python3 .devcontainer/gen_mcp_json.py
bash .devcontainer/o2-import-dashboards.sh
echo 'OpenObserve started (UI: http://localhost:5080, MCP: .mcp.json)'
"""

["o2:install"]
description = "Install OpenObserve Enterprise to ~/.local/bin"
run = """
#!/usr/bin/env bash
set -euo pipefail

install_dir="${HOME}/.local/bin"
target="${install_dir}/openobserve"
version="${OPENOBSERVE_VERSION}"

# Idempotent: skip if same version already installed
if [ -x "${target}" ]; then
  installed="$("${target}" --version 2>/dev/null | grep -oP '\\d+\\.\\d+\\.\\d+' || true)"
  expected="${version#v}"
  if [ "${installed}" = "${expected}" ]; then
    echo "OpenObserve ${version} already installed at ${target}"
    exit 0
  fi
fi

# Architecture detection
case "$(uname -m)" in
  x86_64)  arch="amd64" ;;
  aarch64) arch="arm64" ;;
  *)
    echo "Error: unsupported architecture $(uname -m)" >&2
    exit 1
    ;;
esac

filename="openobserve-ee-${version}-linux-${arch}-musl.tar.gz"
url="https://downloads.openobserve.ai/releases/o2-enterprise/${version}/${filename}"
tmpfile="$(mktemp)"
trap 'rm -f "${tmpfile}"' EXIT

echo "Downloading OpenObserve ${version} (${arch})..."
curl -fSL --retry 3 --retry-delay 2 --retry-connrefused -o "${tmpfile}" "${url}"

mkdir -p "${install_dir}"
tar -xzf "${tmpfile}" -C "${install_dir}"
chmod +x "${target}"

echo "OpenObserve ${version} installed to ${target}"
"${target}" --version
"""

["o2:stop"]
description = "Stop OpenObserve"
run = """
#!/usr/bin/env bash
set -euo pipefail

pkill -x openobserve 2>/dev/null && while pgrep -x openobserve > /dev/null; do sleep 0.1; done || true
"""

