# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: "Lint GitHub Actions"
description: "Run actionlint and zizmor on workflow files, then report results"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false

    - name: Check workflow files with actionlint
      id: actionlint
      shell: bash
      env:
        ACTIONLINT_VERSION: 03d0035246f3e81f36aed592ffb4bebf33a03106 # v1.7.7
      run: |
        bash <(curl -sfSL --retry 3 --retry-delay 2 --retry-connrefused "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_VERSION}/scripts/download-actionlint.bash")
        ./actionlint -verbose -format "$(cat .github/workflows/actionlint-format.txt)" | tee results-actionlint.sarif

    - name: Upload actionlint SARIF
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: results-actionlint.sarif
        category: actionlint

    - name: Run zizmor
      id: zizmor
      if: success() || failure()
      uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
      with:
        persona: pedantic

    - name: Summary
      if: always()
      shell: bash
      env:
        ACTIONLINT_OUTCOME: ${{ steps.actionlint.outcome }}
        ZIZMOR_OUTCOME: ${{ steps.zizmor.outcome }}
      run: |
        cat <<EOF >> "${GITHUB_STEP_SUMMARY}"
        ## Linting Results
        | Tool | Status |
        |------|--------|
        | actionlint | "${ACTIONLINT_OUTCOME}" |
        | zizmor | "${ZIZMOR_OUTCOME}" |

        EOF
