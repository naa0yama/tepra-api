# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Rust CI
on:
  workflow_call: {}
  workflow_dispatch:

permissions: {}

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  setup:
    name: Load CI config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      timeout_minutes: ${{ steps.load.outputs.timeout_minutes }}
      apt_packages: ${{ steps.load.outputs.apt_packages }}
      cross_check_matrix: ${{ steps.load.outputs.cross_check_matrix }}
      sccache: ${{ steps.versions.outputs.sccache }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check Rust version consistency
        run: |
          rust_version=$(grep -E 'FROM.*rust:[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -1 | sed -E 's/.*rust:([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          tool_version=$(grep -E '^channel = "[0-9]+\.[0-9]+\.[0-9]+"' rust-toolchain.toml | sed -E 's/channel = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/')
          if [ "$rust_version" != "$tool_version" ]; then
            echo "ERROR: Rust version mismatch! Dockerfile: $rust_version, rust-toolchain.toml: $tool_version"
            exit 1
          fi

      - name: Extract tool versions
        id: versions
        run: |
          sccache_version=$(grep -E '^ARG SCCACHE_VERSION=v?[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | sed -E 's/ARG SCCACHE_VERSION=(v?[0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "sccache=${sccache_version}" >> "$GITHUB_OUTPUT"

      - name: Load project config
        id: load
        run: |
          timeout_minutes=$(jq -r '.timeout_minutes // 15' .github/project-config.json)
          apt_packages=$(jq -r '.apt_packages // ""' .github/project-config.json)
          cross_check_matrix=$(jq -c '.cross_check_targets' .github/project-config.json)
          {
            echo "timeout_minutes=${timeout_minutes}"
            echo "apt_packages=${apt_packages}"
            echo "cross_check_matrix=${cross_check_matrix}"
          } >> "$GITHUB_OUTPUT"

  fmt:
    name: fmt
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(needs.setup.outputs.timeout_minutes) }}
    permissions:
      contents: read # Required to checkout the repository

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/act-setup-rust
        with:
          sccache: ${{ needs.setup.outputs.sccache }}
          sccache_disable_annotations: true

      - name: Cache system packages
        if: needs.setup.outputs.apt_packages != ''
        id: apt-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/apt-cache
          key: apt-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/rust-ci.yaml') }}
          restore-keys: |
            apt-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Download system packages
        if: needs.setup.outputs.apt_packages != '' && steps.apt-cache.outputs.cache-hit != 'true'
        env:
          APT_PACKAGES: ${{ needs.setup.outputs.apt_packages }}
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          mkdir -p ~/apt-cache
          sudo apt-get update -qq
          # shellcheck disable=SC2086
          sudo apt-get install -y --no-install-recommends --download-only \
            -o Dir::Cache::Archives="${HOME}/apt-cache" \
            ${APT_PACKAGES}
          sudo chown -R "$(id -u):$(id -g)" ~/apt-cache
          rm -rf ~/apt-cache/partial ~/apt-cache/lock

      - name: Install system packages
        if: needs.setup.outputs.apt_packages != ''
        run: sudo dpkg -i ~/apt-cache/*.deb

      - name: Cache mise tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise
          key: mise-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-v1-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache dprint plugins
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/dprint
          key: dprint-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('dprint.jsonc') }}
          restore-keys: |
            dprint-v1-${{ runner.os }}-${{ runner.arch }}-

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          # renovate: datasource=github-releases packageName=jdx/mise versioning=calver:YYYY.M.D automerge=true
          version: 2026.6.12

      - name: Check formatting
        run: |
          set -euxo pipefail
          mise run fmt:check

      - name: Run clippy
        run: |
          set -euxo pipefail
          mise run clippy:strict

  cross-check:
    name: cross-check (${{ matrix.name || matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [setup, fmt]
    timeout-minutes: ${{ fromJSON(needs.setup.outputs.timeout_minutes) }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.cross_check_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Cache system packages
        if: matrix.os == 'ubuntu-latest' && matrix.apt_packages
        id: apt-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/apt-cache
          key: apt-v2-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ hashFiles('.github/workflows/rust-ci.yaml') }}
          restore-keys: |
            apt-v2-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-

      - name: Download system packages
        if: matrix.os == 'ubuntu-latest' && matrix.apt_packages && steps.apt-cache.outputs.cache-hit != 'true'
        env:
          APT_PACKAGES: ${{ matrix.apt_packages }}
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          mkdir -p ~/apt-cache
          sudo apt-get update -qq
          # shellcheck disable=SC2086
          sudo apt-get install -y --no-install-recommends --download-only \
            -o Dir::Cache::Archives="${HOME}/apt-cache" \
            ${APT_PACKAGES}
          sudo chown -R "$(id -u):$(id -g)" ~/apt-cache
          rm -rf ~/apt-cache/partial ~/apt-cache/lock

      - name: Install system packages
        if: matrix.os == 'ubuntu-latest' && matrix.apt_packages
        shell: bash
        run: sudo dpkg -i ~/apt-cache/*.deb

      - name: Add target
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "${TARGET}"

      - name: Rust setup
        uses: ./.github/actions/act-setup-rust
        with:
          sccache: ${{ needs.setup.outputs.sccache }}
          sccache_disable_annotations: true

      - name: Check compilation for ${{ matrix.target }}
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          SCOPE: ${{ matrix.scope }}
        run: |
          set -euxo pipefail
          # shellcheck disable=SC2086
          cargo check ${SCOPE:---all-targets} --target "${TARGET}"

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [setup, fmt]
    timeout-minutes: ${{ fromJSON(needs.setup.outputs.timeout_minutes) }}
    permissions:
      actions: write #        For octocov to store/delete previous reports from artifacts
      contents: write #       For pushing coverage badges to the badges branch
      pull-requests: write #  For octocov to comment on pull requests

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/act-setup-rust
        with:
          sccache: ${{ needs.setup.outputs.sccache }}

      - name: Cache system packages
        if: needs.setup.outputs.apt_packages != ''
        id: apt-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/apt-cache
          key: apt-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/rust-ci.yaml') }}
          restore-keys: |
            apt-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Download system packages
        if: needs.setup.outputs.apt_packages != '' && steps.apt-cache.outputs.cache-hit != 'true'
        env:
          APT_PACKAGES: ${{ needs.setup.outputs.apt_packages }}
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          mkdir -p ~/apt-cache
          sudo apt-get update -qq
          # shellcheck disable=SC2086
          sudo apt-get install -y --no-install-recommends --download-only \
            -o Dir::Cache::Archives="${HOME}/apt-cache" \
            ${APT_PACKAGES}
          sudo chown -R "$(id -u):$(id -g)" ~/apt-cache
          rm -rf ~/apt-cache/partial ~/apt-cache/lock

      - name: Install system packages
        if: needs.setup.outputs.apt_packages != ''
        run: sudo dpkg -i ~/apt-cache/*.deb

      - name: Cache mise tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise
          key: mise-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-v1-${{ runner.os }}-${{ runner.arch }}-

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          # renovate: datasource=github-releases packageName=jdx/mise versioning=calver:YYYY.M.D automerge=true
          version: 2026.6.12

      - name: Generate coverage report
        run: |
          set -euxo pipefail
          mise run coverage

      - name: Upload coverage
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push coverage badges
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          [[ -f coverage.svg && -f time.svg ]] || { echo "Badge files not found, skipping"; exit 0; }

          # Create blobs via stdin (avoids shell argument size limits)
          coverage_blob=$(base64 -w0 coverage.svg \
            | jq -Rsc '{"encoding":"base64","content":.}' \
            | gh api "repos/${GITHUB_REPOSITORY}/git/blobs" --method POST --input - --jq '.sha')
          time_blob=$(base64 -w0 time.svg \
            | jq -Rsc '{"encoding":"base64","content":.}' \
            | gh api "repos/${GITHUB_REPOSITORY}/git/blobs" --method POST --input - --jq '.sha')

          # Get current badges branch state (auto-initialize if branch does not exist)
          if ! head_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/badges" --jq '.object.sha' 2>/dev/null); then
            empty_tree=$(printf '{"tree":[]}' \
              | gh api "repos/${GITHUB_REPOSITORY}/git/trees" --method POST --input - --jq '.sha')
            init_commit=$(printf '{"message":"Initialize badges branch","tree":"%s","parents":[]}' "$empty_tree" \
              | gh api "repos/${GITHUB_REPOSITORY}/git/commits" --method POST --input - --jq '.sha')
            printf '{"ref":"refs/heads/badges","sha":"%s"}' "$init_commit" \
              | gh api "repos/${GITHUB_REPOSITORY}/git/refs" --method POST --input -
            head_sha=$init_commit
          fi
          tree_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${head_sha}" --jq '.tree.sha')

          # Skip if content unchanged (compare blob SHAs)
          coverage_existing=$(gh api "repos/${GITHUB_REPOSITORY}/git/trees/${tree_sha}" \
            --jq '.tree[] | select(.path == "coverage.svg") | .sha')
          time_existing=$(gh api "repos/${GITHUB_REPOSITORY}/git/trees/${tree_sha}" \
            --jq '.tree[] | select(.path == "time.svg") | .sha')
          if [[ "$coverage_blob" == "$coverage_existing" && "$time_blob" == "$time_existing" ]]; then
            echo "No badge changes"
            exit 0
          fi

          # Use --input - to pass complete JSON body, avoiding --field parsing issues
          new_tree=$(printf \
            '{"base_tree":"%s","tree":[{"path":"coverage.svg","mode":"100644","type":"blob","sha":"%s"},{"path":"time.svg","mode":"100644","type":"blob","sha":"%s"}]}' \
            "$tree_sha" "$coverage_blob" "$time_blob" \
            | gh api "repos/${GITHUB_REPOSITORY}/git/trees" --method POST --input - --jq '.sha')

          new_commit=$(printf \
            '{"message":"Update coverage badges [skip ci]","tree":"%s","parents":["%s"]}' \
            "$new_tree" "$head_sha" \
            | gh api "repos/${GITHUB_REPOSITORY}/git/commits" --method POST --input - --jq '.sha')

          gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/badges" \
            --method PATCH --field sha="${new_commit}"
          echo "Coverage badges updated"
